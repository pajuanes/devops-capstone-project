[nosetests]
verbosity=2
with-coverage=1
cover-erase=1
cover-package=service
where=tests
match=test_*.py
ignore-files=__init__.py
# exclude-dir=tests/integration

[tool:pytest]
testpaths = tests
python_files = test_*.py

[coverage:report]
show_missing = True

[flake8]
per-file-ignores =
    */__init__.py: F401 E402

[pylint.'MESSAGES CONTROL']
disable=E1101
